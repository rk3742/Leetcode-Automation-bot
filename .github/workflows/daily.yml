name: LeetCode Daily Bot

on:
  schedule:
    - cron: '00 05 * * *'   # 10:30 AM IST = 05:00 AM UTC
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10      # kill if stuck for more than 10 mins

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LeetCode Bot
        timeout-minutes: 8
        env:
          PYTHONUNBUFFERED: "1"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LEETCODE_CSRFTOKEN: ${{ secrets.LEETCODE_CSRFTOKEN }}
          LEETCODE_SESSION:   ${{ secrets.LEETCODE_SESSION }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:     ${{ secrets.EMAIL_RECEIVER }}
        run: python -u leetcode_daily.py
