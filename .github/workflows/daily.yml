name: LeetCode Daily Bot

on:
  schedule:
    - cron: '30 3 * * *'   # 3:30 AM UTC = 9:00 AM IST
                            # Even with 3hr GitHub delay = runs by 12:30 PM IST
                            # LeetCode streak resets midnight IST = plenty of time
  workflow_dispatch:        # manual trigger button

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LeetCode Bot
        timeout-minutes: 8
        env:
          PYTHONUNBUFFERED: "1"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LEETCODE_CSRFTOKEN: ${{ secrets.LEETCODE_CSRFTOKEN }}
          LEETCODE_SESSION:   ${{ secrets.LEETCODE_SESSION }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:     ${{ secrets.EMAIL_RECEIVER }}
        run: python -u leetcode_daily.py
