name: LeetCode Daily Bot

on:
  schedule:
    - cron: '00 05 * * *'   # 10:30 AM IST = 05:00 AM UTC, runs every day
  workflow_dispatch:          # adds a manual "Run workflow" button on GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run LeetCode Bot
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          LEETCODE_CSRFTOKEN: ${{ secrets.LEETCODE_CSRFTOKEN }}
          LEETCODE_SESSION:   ${{ secrets.LEETCODE_SESSION }}
          EMAIL_SENDER:       ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:     ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:     ${{ secrets.EMAIL_RECEIVER }}
        run: python leetcode_daily.py